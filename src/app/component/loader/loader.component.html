@if (loader$ | async) {
<div
  class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/10 backdrop-blur-sm"
>
  <div class="flex flex-col items-center gap-6">
    <div class="flex gap-2">
      <span class="dot-pulse w-2 h-2 rounded-full bg-blue-600" style="animation-delay: 0s"></span>
      <span class="dot-pulse w-2 h-2 rounded-full bg-blue-500" style="animation-delay: 0.2s"></span>
      <span class="dot-pulse w-2 h-2 rounded-full bg-blue-400" style="animation-delay: 0.4s"></span>
    </div>
  </div>
</div>
}
