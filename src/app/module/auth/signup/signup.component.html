    <h2 class="text-white text-xl font-bold mt-1 z-10">Admin Registration</h2>
    <p class="text-purple-100 text-sm text-center mt-1 max-w-xs leading-relaxed z-10">
      Set up your organization and manage your team with full control.
    </p>

    <div class="flex gap-2 mt-3 z-10">
      <span class="dot-inactive"></span>
      <span class="dot-active"></span>
      <span class="dot-inactive"></span>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="flex-1 flex flex-col bg-white overflow-hidden">

    <!-- Top nav -->
    <div class="flex justify-end items-center px-8 pt-5 pb-1 gap-3 shrink-0">
      <a routerLink="/" class="px-5 py-2 rounded-full text-sm font-semibold border-2 border-violet-600 text-violet-600 hover:bg-violet-50 transition-colors">Log in</a>
      <button class="px-5 py-2 rounded-full text-sm font-semibold bg-violet-600 text-white">Sign Up</button>
    </div>

    <!-- Form centered -->
    <div class="flex-1 flex items-center justify-center px-8 pb-2">
      <div class="w-full max-w-lg">

        <h1 class="text-2xl font-bold text-slate-800 mb-1">Create Admin Account <span class="text-violet-600">:)</span></h1>
        <p class="text-sm text-slate-500 leading-relaxed mb-3">
          Register your organization account to access the admin dashboard and team management tools.
        </p>

        <!-- Admin badge -->
        <span class="inline-flex items-center gap-2 bg-violet-50 border border-violet-200 rounded-full px-4 py-1.5 text-xs font-semibold text-violet-700 mb-4">
          <i class="pi pi-shield text-xs"></i> Administrator Account
        </span>

        <form (ngSubmit)="onRegister()">

          <!-- Row 1 -->
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Full Name</label>
              <div class="relative flex items-center">
                <i class="pi pi-user absolute left-3 text-slate-400 text-xs"></i>
                <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="John Smith"
                  class="w-full pl-8 pr-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all" required/>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Company Name</label>
              <div class="relative flex items-center">
                <i class="pi pi-building absolute left-3 text-slate-400 text-xs"></i>
                <input type="text" [(ngModel)]="companyName" name="companyName" placeholder="Acme Corp"
                  class="w-full pl-8 pr-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all" required/>
              </div>
            </div>
          </div>

          <!-- Row 2 -->
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
              <div class="relative flex items-center">
                <i class="pi pi-envelope absolute left-3 text-slate-400 text-xs"></i>
                <input type="email" [(ngModel)]="email" name="email" placeholder="admin@company.com"
                  class="w-full pl-8 pr-8 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all" required/>
                <i class="pi pi-check-circle absolute right-3 text-green-500 text-xs" *ngIf="email.includes('@')"></i>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Phone Number</label>
              <div class="relative flex items-center">
                <i class="pi pi-phone absolute left-3 text-slate-400 text-xs"></i>
                <input type="tel" [(ngModel)]="phone" name="phone" placeholder="+1 (555) 000-0000"
                  class="w-full pl-8 pr-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all"/>
              </div>
            </div>
          </div>

          <!-- Row 3 -->
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
              <div class="relative flex items-center">
                <i class="pi pi-lock absolute left-3 text-slate-400 text-xs"></i>
                <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="••••••••••"
                  class="w-full pl-8 pr-8 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all" required/>
                <i class="pi absolute right-3 text-slate-400 text-xs cursor-pointer hover:text-violet-500 transition-colors"
                  [class.pi-eye]="!showPassword" [class.pi-eye-slash]="showPassword" (click)="togglePassword()"></i>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-700 mb-1">Confirm Password</label>
              <div class="relative flex items-center">
                <i class="pi pi-lock absolute left-3 text-slate-400 text-xs"></i>
                <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••••"
                  class="w-full pl-8 pr-8 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-violet-500 focus:bg-white focus:ring-2 focus:ring-violet-100 transition-all" required/>
                <i class="pi absolute right-3 text-xs cursor-pointer transition-colors"
                  [class.pi-check-circle]="passwordMatch"
                  [class.pi-eye]="!passwordMatch && !showConfirm"
                  [class.pi-eye-slash]="!passwordMatch && showConfirm"
                  [class.text-green-500]="passwordMatch"
                  [class.text-slate-400]="!passwordMatch"
                  (click)="!passwordMatch && toggleConfirm()"></i>
              </div>
            </div>
          </div>

          <!-- Terms -->
          <div class="mb-4">
            <label class="flex items-start gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="checkbox" [(ngModel)]="agreeTerms" name="agreeTerms" class="accent-violet-600 w-4 h-4 mt-0.5 shrink-0" required/>
              <span>I agree to the <a href="#" class="text-violet-600 font-medium hover:underline">Terms of Service</a> and <a href="#" class="text-violet-600 font-medium hover:underline">Privacy Policy</a></span>
            </label>
          </div>

          <!-- Register button -->
          <button type="submit" [disabled]="!agreeTerms"
            class="w-full py-3 rounded-full bg-gradient-to-r from-violet-500 to-purple-700 text-white text-sm font-semibold flex items-center justify-center gap-2 shadow-md shadow-purple-200 hover:-translate-y-px hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none mb-3">
            <i class="pi pi-user-plus text-sm"></i>
            Create Admin Account
          </button>

          <p class="text-center text-sm text-slate-500">
            Already have an account?
            <a routerLink="/" class="text-violet-600 font-semibold hover:underline">Sign in here</a>
          </p>

        </form>
      </div>
    </div>
  </div>

</div>
