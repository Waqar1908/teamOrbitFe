    <h2 class="text-white text-xl font-bold mt-2 z-10">Manage Your Team</h2>
    <p class="text-blue-100 text-sm text-center mt-1 max-w-xs leading-relaxed z-10">
      Streamline attendance, employees &amp; operations in one place.
    </p>

    <!-- dots -->
    <div class="flex gap-2 mt-4 z-10">
      <span class="dot-active"></span>
      <span class="dot-inactive"></span>
      <span class="dot-inactive"></span>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="flex-1 flex flex-col bg-white overflow-hidden">

    <!-- Top nav -->
    <div class="flex justify-end items-center px-8 pt-6 pb-2 gap-3 shrink-0">
      <button class="px-5 py-2 rounded-full text-sm font-semibold bg-blue-600 text-white">Log in</button>
      <a routerLink="/register" class="px-5 py-2 rounded-full text-sm font-semibold border-2 border-blue-600 text-blue-600 hover:bg-blue-50 transition-colors " (click)="getSignUpInit('SignUp')">Sign Up</a>
    </div>

    <!-- Form centered -->
    <div class="flex-1 flex items-center justify-center px-8 pb-4">
      <div class="w-full max-w-sm">

        <h1 class="text-2xl font-bold text-slate-800 mb-1">Welcome Back <span class="text-blue-600">:)</span></h1>
        <p class="text-sm text-slate-500 leading-relaxed mb-4">
          Login with your personal email address and password to stay connected.
        </p>

        <!-- Role toggle -->
        <div class="flex bg-slate-100 rounded-xl p-1 w-fit mb-5">
          <button
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="loginType === 'user' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'"
            (click)="loginType = 'user'">
            <i class="pi pi-user text-xs"></i> User
          </button>
          <button
            class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all"
            [class]="loginType === 'admin' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'"
            (click)="loginType = 'admin'">
            <i class="pi pi-shield text-xs"></i> Admin
          </button>
        </div>

        <form (ngSubmit)="onLogin()">
          <!-- Email -->
          <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
            <div class="relative flex items-center">
              <i class="pi pi-envelope absolute left-3 text-slate-400 text-sm"></i>
              <input
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="example@gmail.com"
                class="w-full pl-9 pr-9 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all"
                required
              />
              <i class="pi pi-check-circle absolute right-3 text-green-500 text-sm" *ngIf="email.length > 4"></i>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
            <div class="relative flex items-center">
              <i class="pi pi-lock absolute left-3 text-slate-400 text-sm"></i>
              <input
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="••••••••••"
                class="w-full pl-9 pr-9 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 text-slate-800 outline-none focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all"
                required
              />
              <i
                class="pi absolute right-3 text-slate-400 text-sm cursor-pointer hover:text-blue-500 transition-colors"
                [class.pi-eye]="!showPassword"
                [class.pi-eye-slash]="showPassword"
                (click)="togglePassword()"
              ></i>
            </div>
          </div>

          <!-- Remember + Forgot -->
          <div class="flex justify-between items-center mb-4">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="accent-blue-600 w-4 h-4" />
              Remember Me
            </label>
            <a href="#" class="text-xs text-blue-600 font-medium hover:underline">Forgot Password?</a>
          </div>

          <!-- Buttons -->
          <div class="flex gap-3 mb-5">
            <button type="submit" class="flex-1 py-2.5 rounded-full bg-gradient-to-r from-blue-500 to-blue-700 text-white text-sm font-semibold shadow-md shadow-blue-200 hover:-translate-y-px hover:shadow-lg transition-all">
              Login Now
            </button>
            <a routerLink="/register" class="flex-1 py-2.5 rounded-full border border-slate-300 text-slate-600 text-sm font-semibold text-center hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 transition-all">
              Create Account
            </a>
          </div>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 mb-4">
          <span class="flex-1 h-px bg-slate-200"></span>
          <span class="text-xs text-slate-400">Or you can join with</span>
          <span class="flex-1 h-px bg-slate-200"></span>
        </div>

        <!-- Social -->
        <div class="flex justify-center gap-3">
          <button class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center hover:border-blue-300 hover:shadow-md transition-all">
            <svg viewBox="0 0 24 24" class="w-5 h-5">

              <path fill="#34A853" d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"/>
              <path fill="#4A90E2" d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"/>
              <path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z"/>
            </svg>
          </button>
          <button class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center hover:border-blue-300 hover:shadow-md transition-all">
            <svg viewBox="0 0 24 24" class="w-5 h-5">
              <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </button>
          <button class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center hover:border-blue-300 hover:shadow-md transition-all">
            <svg viewBox="0 0 24 24" class="w-5 h-5">
              <path fill="#1DA1F2" d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
            </svg>
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
