<div class="auth-wrapper">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <!-- Logo / Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="20" fill="rgba(255,255,255,0.2)"/>
            <path d="M12 26 L20 14 L28 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="12" r="3" fill="white"/>
          </svg>
        </div>
        <span class="brand-name">TeamOrbit</span>
      </div>

      <!-- Illustration -->
      <div class="illustration">
        <svg viewBox="0 0 380 320" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Desk -->
          <rect x="40" y="220" width="300" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
          <rect x="60" y="232" width="10" height="50" rx="5" fill="rgba(255,255,255,0.2)"/>
          <rect x="310" y="232" width="10" height="50" rx="5" fill="rgba(255,255,255,0.2)"/>

          <!-- Laptop screen -->
          <rect x="130" y="140" width="130" height="85" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          <rect x="136" y="146" width="118" height="73" rx="3" fill="rgba(255,255,255,0.1)"/>
          <!-- Screen content lines -->
          <rect x="145" y="158" width="60" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
          <rect x="145" y="168" width="85" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
          <rect x="145" y="177" width="70" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
          <rect x="145" y="186" width="50" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
          <!-- Laptop base -->
          <rect x="115" y="222" width="160" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>

          <!-- Person 1 (man standing left) -->
          <!-- Head -->
          <circle cx="90" cy="95" r="22" fill="#FDDCB5"/>
          <!-- Hair -->
          <path d="M68 88 Q75 68 90 70 Q105 68 112 88" fill="#2D1B0E"/>
          <!-- Suit body -->
          <path d="M62 145 Q62 120 90 118 Q118 120 118 145 L122 220 H58 Z" fill="#1E3A5F"/>
          <!-- White shirt -->
          <rect x="83" y="118" width="14" height="40" fill="white"/>
          <!-- Tie -->
          <path d="M88 118 L90 150 L92 118" fill="#E74C3C"/>
          <!-- Left arm -->
          <path d="M62 130 Q45 145 40 170" stroke="#FDDCB5" stroke-width="12" stroke-linecap="round"/>
          <!-- Right arm pointing -->
          <path d="M118 130 Q135 140 160 138" stroke="#FDDCB5" stroke-width="12" stroke-linecap="round"/>
          <!-- Hand pointing -->
          <circle cx="162" cy="138" r="8" fill="#FDDCB5"/>
          <!-- Legs -->
          <rect x="68" y="218" width="18" height="60" rx="8" fill="#1E3A5F"/>
          <rect x="100" y="218" width="18" height="60" rx="8" fill="#1E3A5F"/>
          <!-- Shoes -->
          <ellipse cx="77" cy="278" rx="14" ry="7" fill="#1a1a1a"/>
          <ellipse cx="109" cy="278" rx="14" ry="7" fill="#1a1a1a"/>

          <!-- Person 2 (woman sitting right) -->
          <!-- Chair back -->
          <rect x="240" y="155" width="12" height="70" rx="6" fill="rgba(255,255,255,0.3)"/>
          <rect x="238" y="153" width="60" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
          <!-- Head -->
          <circle cx="280" cy="115" r="22" fill="#FDDCB5"/>
          <!-- Hair long -->
          <path d="M258 110 Q262 85 280 82 Q298 85 302 110 L305 145 Q295 148 280 146 Q265 148 255 145 Z" fill="#8B4513"/>
          <!-- Body (yellow top) -->
          <path d="M255 148 Q255 138 280 136 Q305 138 305 148 L308 215 H252 Z" fill="#F0C040"/>
          <!-- Left arm on desk -->
          <path d="M255 155 Q240 165 220 168" stroke="#FDDCB5" stroke-width="10" stroke-linecap="round"/>
          <!-- Right arm down -->
          <path d="M305 155 Q315 170 318 190" stroke="#FDDCB5" stroke-width="10" stroke-linecap="round"/>
          <!-- Skirt/bottom -->
          <path d="M252 215 L248 282 H268 L280 240 L292 282 H312 L308 215Z" fill="#4A90D9"/>

          <!-- Floating elements -->
          <!-- Chart bubble -->
          <rect x="20" y="50" width="75" height="55" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <polyline points="32,92 45,75 58,82 70,65 82,70" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <text x="30" y="68" font-size="8" fill="rgba(255,255,255,0.8)" font-family="sans-serif">Analytics</text>

          <!-- Checkmark bubble -->
          <rect x="285" y="45" width="70" height="50" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <circle cx="310" cy="68" r="12" fill="rgba(255,255,255,0.3)"/>
          <polyline points="304,68 309,73 318,62" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <text x="328" y="72" font-size="8" fill="rgba(255,255,255,0.8)" font-family="sans-serif">Done</text>

          <!-- Stars/dots decoration -->
          <circle cx="50" cy="165" r="4" fill="rgba(255,255,255,0.4)"/>
          <circle cx="330" cy="120" r="4" fill="rgba(255,255,255,0.4)"/>
          <circle cx="200" cy="40" r="5" fill="rgba(255,255,255,0.3)"/>
          <circle cx="170" cy="55" r="3" fill="rgba(255,255,255,0.25)"/>
          <circle cx="360" cy="200" r="6" fill="rgba(255,255,255,0.2)"/>
        </svg>
      </div>

      <h2 class="left-heading">Manage Your Team</h2>
      <p class="left-subtext">Streamline attendance, employees, and company operations in one place.</p>

      <!-- Dots indicator -->
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Top nav -->
    <div class="top-nav">
      <button class="nav-btn active">Log in</button>
      <a  class="nav-btn outline" (click)="getSignUpInit('SignUp')">Sign Up</a>
    </div>

    <div class="form-container">
      <h1 class="form-title">Welcome Back <span class="wave">:)</span></h1>
      <p class="form-subtitle">
        To keep connected with us please login with your personal
        information by email address and password
      </p>

      <!-- Login type toggle -->
      <div class="role-toggle">
        <button
          class="role-btn"
          [class.role-active]="loginType === 'user'"
          (click)="loginType = 'user'">
          <i class="pi pi-user"></i> User
        </button>
        <button
          class="role-btn"
          [class.role-active]="loginType === 'admin'"
          (click)="loginType = 'admin'">
          <i class="pi pi-shield"></i> Admin
        </button>
      </div>

      <form (ngSubmit)="onLogin()">
        <!-- Email -->
        <div class="field-wrap">
          <label class="field-label">Email Address</label>
          <div class="input-group">
            <i class="pi pi-envelope input-icon"></i>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="example&#64;gmail.com"
              class="field-input"
              required
            />
            <i class="pi pi-check-circle valid-icon" *ngIf="email.length > 4"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="field-wrap">
          <label class="field-label">Password</label>
          <div class="input-group">
            <i class="pi pi-lock input-icon"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••••"
              class="field-input"
              required
            />
            <i
              class="pi toggle-pw"
              [class.pi-eye]="!showPassword"
              [class.pi-eye-slash]="showPassword"
              (click)="togglePassword()"
            ></i>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="remember-check" />
            <span>Remember Me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
          <button type="submit" class="btn-primary">Login Now</button>
          <a routerLink="/register" class="btn-secondary">Create Account</a>
        </div>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">Or you can join with</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social buttons -->
      <div class="social-row">
        <button class="social-btn google">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"/>
            <path fill="#34A853" d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"/>
            <path fill="#4A90E2" d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"/>
            <path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z"/>
          </svg>
        </button>
        <button class="social-btn facebook">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>
        <button class="social-btn twitter">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#1DA1F2" d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
