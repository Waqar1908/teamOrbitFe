<div class="bg-[#f4f6fb] p-4 min-h-screen">

    <!-- HEADER -->
    <div class="mb-3">
        <h2 class="text-[18px] font-semibold text-[#2b2f38]">
            Analysis & Reports
        </h2>
        <p class="text-[12px] text-[#8b909a] mt-1">
            Monitor employee performance and analytics
        </p>
    </div>

    <!-- DATE + EXPORT -->
    <div class="flex justify-between items-center mb-3">

        <div class="text-[13px] text-gray-600">
            Showing data for:
            <span class="font-medium text-gray-800">Last 7 Days</span>
        </div>

        <div class="flex items-center gap-2">

            <p-dropdown [options]="ranges" [(ngModel)]="selectedRange" class="custom-dropdown w-[120px]">
            </p-dropdown>

            <button pButton label="Export"
                class="!bg-white !border !border-[#e5e7eb] !rounded-full !px-4 !h-[34px] !text-[12px] !text-gray-700">
            </button>

        </div>

    </div>

    <!-- CARDS (FROM TS) -->
   <div class="grid grid-cols-4 gap-3 mb-3">

  @for (card of cards; track $index) {

    <div class="bg-white border border-[#e6e9ef] rounded-lg px-4 py-3 flex items-center justify-between">

      <!-- TEXT -->
      <div>
        <p class="text-[11px] text-gray-500">
          {{ card.title }}
        </p>
        <h3 class="text-[18px] font-semibold text-[#111827] mt-1">
          {{ card.value }}
        </h3>
      </div>

      <!-- ICON BOX -->
      <div class="w-9 h-9 rounded-md flex items-center justify-center"
           [ngClass]="card.bg">

        <i [class]="card.icon + ' ' + card.color + ' text-[15px]'"></i>

      </div>

    </div>

  }

</div>

    <!-- CHARTS -->
    <div class="grid grid-cols-2 gap-3">

        <!-- CHART 1 -->
        <div class="bg-white border border-[#e6e9ef] rounded-lg overflow-hidden">
            <div class="px-4 py-2 border-b text-[13px] font-medium text-gray-700">
                Attendance Overview
            </div>
            <div class="p-4">
                <apx-chart [series]="attendanceChart.series" [chart]="attendanceChart.chart"
                    [xaxis]="attendanceChart.xaxis" [stroke]="attendanceChart.stroke">
                </apx-chart>
            </div>
        </div>

        <!-- CHART 2 -->
        <div class="bg-white border border-[#e6e9ef] rounded-lg overflow-hidden">
            <div class="px-4 py-2 border-b text-[13px] font-medium text-gray-700">
                Leave Distribution
            </div>
            <div class="p-4">
                <apx-chart [series]="leaveChart.series" [chart]="leaveChart.chart" [labels]="leaveChart.labels">
                </apx-chart>
            </div>
        </div>

        <!-- CHART 3 -->
        <div class="bg-white border border-[#e6e9ef] rounded-lg overflow-hidden">
            <div class="px-4 py-2 border-b text-[13px] font-medium text-gray-700">
                Monthly Attendance
            </div>
            <div class="p-4">
                <apx-chart [series]="monthlyChart.series" [chart]="monthlyChart.chart" [xaxis]="monthlyChart.xaxis">
                </apx-chart>
            </div>
        </div>

        <!-- CHART 4 -->
        <div class="bg-white border border-[#e6e9ef] rounded-lg overflow-hidden">
            <div class="px-4 py-2 border-b text-[13px] font-medium text-gray-700">
                Working Hours Trend
            </div>
            <div class="p-4">
                <apx-chart [series]="hoursChart.series" [chart]="hoursChart.chart" [stroke]="hoursChart.stroke"
                    [fill]="hoursChart.fill" [xaxis]="hoursChart.xaxis">
                </apx-chart>
            </div>
        </div>

    </div>

</div>
