<div 
  [class.w-64]="!isCollapsed" 
  [class.w-20]="isCollapsed"
  class="h-screen bg-gray-900 text-white flex flex-col transition-all duration-300 overflow-auto"
>

  <!-- Logo + Toggle -->
  <div class="p-4 border-b border-gray-700 flex items-center justify-between">
    
    <div class="flex items-center gap-2">
      <i class="pi pi-prime text-blue-400 text-2xl"></i>

      @if (!isCollapsed) {
        <span class="text-xl font-bold">TeamOrbit</span>
      }
    </div>

    <button (click)="toggleSidebar()">
      <i class="pi" [ngClass]="isCollapsed ? 'pi-angle-right' : 'pi-angle-left'"></i>
    </button>
  </div>

  <!-- Menu -->
 <nav class="flex-1 p-2 space-y-2">

  @for (item of menuItems; track item.route) {
    <a
      routerLinkActive="bg-gray-700 text-blue-400"
      class="flex items-center gap-3 p-2 rounded hover:bg-gray-700 transition cursor-pointer"
      (click)="navigate(item)"
    >
      <i [class]="item.icon + ' text-lg'"></i>

      @if (!isCollapsed) {
        <span>{{ item.label }}</span>
      }
    </a>
  }

</nav>

  <!-- Logout -->
  <div class="p-4 border-t border-gray-700">
    <button class="flex items-center gap-3 w-full hover:text-red-400 transition cursor-pointer" (click)="logout()">
      <i class="pi pi-sign-out text-lg"></i>
      @if (!isCollapsed) {
        <span>Logout</span>
      }
    </button>
  </div>

</div>
