<header class="w-full bg-white px-6 py-3 flex items-center justify-between border-b border-gray-100">
  <div class="flex items-center gap-4">
    <button class="text-gray-500 text-xl">
      <i class="pi pi-bars"></i>
    </button>

    <div class="flex items-center gap-2">
      <h1 class="text-sm font-semibold text-gray-800">TeamOrbit Pvt. Ltd.</h1>
      <i class="pi pi-verified text-blue-500 text-sm"></i>
    </div>
  </div>

  <div class="flex items-center gap-6">

    <div class="relative w-80">
      <input
        type="text"
        placeholder="Search anything..."
        class="w-full bg-gray-100 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none"
      />
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
    </div>

    <div class="relative">
      <i class="pi pi-bell text-gray-500 text-lg"></i>
      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">1</span>
    </div>

    <div class="flex items-center gap-2 cursor-pointer">
      <img
        src="https://i.pravatar.cc/40"
        class="w-8 h-8 rounded-full object-cover"
      />
      <div class="leading-tight">
        <p class="text-sm font-medium text-gray-800">Hi, Admin</p>
        <p class="text-xs text-gray-400">Super Admin</p>
      </div>
      <i class="pi pi-chevron-down text-gray-400 text-xs"></i>
    </div>

  </div>

</header>
